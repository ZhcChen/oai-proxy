<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}oai-proxy{% endblock %}</title>
    <link rel="stylesheet" href="/static/vendor/heroui.min.css">
    <link rel="stylesheet" href="/static/app.css">
    <script src="/static/vendor/htmx.min.js" defer></script>
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="/admin">oai-proxy</a>
      <nav>

        <a href="/admin/upstreams">上游</a>

    <main class="page">
      {% block content %}{% endblock %}
    </main>
  </body>
